
name= "adam"
spring.devtools.restart.additional-paths=file:d:/avo-maitrise/front/src
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:d:/avo-maitrise/front/dist/front/browser/

# server.servlet.context-path=/api

# Database connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/si-legale?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=adam
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Yente Configuration
yente.api.url=http://localhost:8000
yente.api.default.dataset=tous_les_datasets?expand=true
yente.api.default.match.path=/match/
yente.api.key=adam
aml.block.threshold=0.80
aml.suspect.threshold=0.60
