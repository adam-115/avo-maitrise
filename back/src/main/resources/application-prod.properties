# application-prod.properties

# Database connection settings (Update with actual production credentials)
spring.datasource.url=jdbc:mysql://your-production-db-host:3306/si-legale?serverTimezone=UTC
spring.datasource.username=production_user
spring.datasource.password=production_secure_password

# Hibernate properties
# In production, it's safer to use 'validate' and let Liquibase manage schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Yente Configuration (Update with actual production API)
yente.api.url=https://api.your-production-yente.com
yente.api.default.dataset=tous_les_datasets?expand=true
yente.api.default.match.path=/match/
yente.api.key=production_yente_key
